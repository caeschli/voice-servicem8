<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceM8 AI Assistant</title>

  <!-- ServiceM8 Client SDK — only activates when inside ServiceM8 iframe -->
  <script src="https://platform.servicem8.com/sdk/1.0/sdk.js"></script>
  <script>
    var smClient = null;
    try { smClient = SMClient.init(); } catch(e) {}
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 480px;
    }

    h1 {
      color: #111827;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Status pill */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected  { background: #10b981; }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.error      { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    /* Transcript */
    .transcript-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      height: 280px;
      overflow-y: auto;
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .transcript-box.hidden { display: none; }

    .transcript-empty {
      color: #9ca3af;
      font-size: 13px;
      text-align: center;
      margin: auto;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      gap: 3px;
    }

    .message.user  { align-self: flex-end;  align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .message-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
    }

    .message-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.agent .message-bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }

    /* Text input row */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row.hidden { display: none; }

    .text-input {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-input:focus       { border-color: #2563eb; }
    .text-input::placeholder { color: #9ca3af; }

    .send-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      width: auto;
    }

    .send-btn:hover    { background: #1d4ed8; }
    .send-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    /* Action buttons */
    .btn {
      width: 100%;
      border: none;
      padding: 13px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:active   { transform: scale(0.98); }
    .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }

    .btn-talk { background: #2563eb; color: white; margin-bottom: 10px; }
    .btn-talk:hover:not(:disabled) { background: #1d4ed8; }
    .btn-talk.active       { background: #ef4444; }
    .btn-talk.active:hover { background: #dc2626; }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 24px 0 20px;
    }

    .sub-text {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .connect-sm8-btn {
      display: block;
      background: #10b981;
      color: white;
      text-decoration: none;
      padding: 13px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      text-align: center;
      transition: background 0.2s, transform 0.1s;
    }

    .connect-sm8-btn:hover  { background: #059669; }
    .connect-sm8-btn:active { transform: scale(0.98); }

    /* Auth section — hidden when session is found */
    #authSection { margin-top: 0; }
    #authSection.hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ServiceM8 Assistant</h1>
    <p class="subtitle">Connect to your intelligent voice dispatcher. You can speak or type.</p>

    <!-- Status -->
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Checking session…</span>
    </div>

    <!-- Transcript -->
    <div class="transcript-box hidden" id="transcriptBox">
      <div class="transcript-empty" id="transcriptEmpty">Conversation will appear here…</div>
    </div>

    <!-- Text input (shown when connected) -->
    <div class="input-row hidden" id="inputRow">
      <input
        type="text"
        class="text-input"
        id="textInput"
        placeholder="Type a message…"
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn">Send</button>
    </div>

    <!-- Talk button -->
    <button class="btn btn-talk" id="talkButton" disabled>🎙 Talk to Assistant</button>

    <!-- Auth section — shown only when no session found -->
    <div id="authSection" class="hidden">
      <hr class="divider">
      <div class="sub-text">Connect your ServiceM8 account to continue:</div>
      <a id="connectBtn" href="#" class="connect-sm8-btn">Connect ServiceM8</a>
    </div>
  </div>

  <script type="module">
    import { Room, RoomEvent } from 'https://esm.sh/livekit-client@2.9.4';

    // ── CONFIGURATION ─────────────────────────────────────────────────────────
    const N8N_WEBHOOK_URL = 'https://n8n.srv1275355.hstgr.cloud/webhook/generate-voice-token';
    const LIVEKIT_URL     = 'wss://test1-ntnp1zzo.livekit.cloud';
    const SESSION_KEY     = 'sm8_session';

    // OAuth configuration
    const OAUTH_CLIENT_ID    = '175357';
    const OAUTH_REDIRECT_URI = 'https://n8n.srv1275355.hstgr.cloud/webhook/servicem8-oauth-callback';
    const OAUTH_STATE        = 'tenant_001';

    // ServiceM8 OAuth scopes — add or remove scopes here as needed.
    // Full scope reference: https://developer.servicem8.com/docs/authentication
    const OAUTH_SCOPES = [
      // Account
      'vendor',
      // Staff
      'read_staff',
      'manage_staff',
      // Locations
      'manage_locations',
      // Customers
      'manage_customers',
      'manage_customer_contacts',
      // Jobs — note: create_jobs is a separate scope from manage_jobs
      'manage_jobs',
      'create_jobs',
      'manage_job_contacts',
      'manage_job_materials',
      'manage_job_payments',
      'read_job_payments',
      // Schedule / allocations
      'read_schedule',
      'manage_schedule',
      // Notes
      'publish_job_notes',
      'read_job_notes',
      // materials
      'read_inventory',
      'manage_inventory',
      // Messaging
      'publish_sms',
      'publish_email',
    ];

    // Build the OAuth URL from the constants above
    const OAUTH_URL = [
      'https://go.servicem8.com/oauth/authorize',
      '?response_type=code',
      `&client_id=${OAUTH_CLIENT_ID}`,
      `&scope=${encodeURIComponent(OAUTH_SCOPES.join(' '))}`,
      `&redirect_uri=${encodeURIComponent(OAUTH_REDIRECT_URI)}`,
      `&state=${OAUTH_STATE}`,
    ].join('');
    // ─────────────────────────────────────────────────────────────────────────

    const talkButton      = document.getElementById('talkButton');
    const statusDot       = document.getElementById('statusDot');
    const statusText      = document.getElementById('statusText');
    const transcriptBox   = document.getElementById('transcriptBox');
    const transcriptEmpty = document.getElementById('transcriptEmpty');
    const inputRow        = document.getElementById('inputRow');
    const textInput       = document.getElementById('textInput');
    const sendBtn         = document.getElementById('sendBtn');
    const authSection     = document.getElementById('authSection');
    const connectBtn      = document.getElementById('connectBtn');

    let currentRoom = null;
    let sessionContext = null; // { first_name, session_token }
    const activeBubbles = {};

    // ── UI helpers ──────────────────────────────────────────
    function setStatus(text, state = '') {
      statusText.textContent = text;
      statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    }

    function addMessage(role, text) {
      transcriptEmpty.style.display = 'none';
      const msg    = document.createElement('div');
      msg.className = 'message ' + role;
      const label  = document.createElement('div');
      label.className = 'message-label';
      label.textContent = role === 'user' ? 'You' : 'Assistant';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      msg.appendChild(label);
      msg.appendChild(bubble);
      transcriptBox.appendChild(msg);
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
      return bubble;
    }

    // ── Session resolution ──────────────────────────────────
    // Priority order:
    //   1. URL param ?session=TOKEN  (returned by n8n after OAuth)
    //   2. localStorage              (returning user, standalone)
    //   3. ServiceM8 SDK invoke      (inside ServiceM8 iframe)
    //   4. No session → show Connect button

    async function resolveSession() {
      // 1. Check for ?session= in URL (just completed OAuth)
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('session');
      if (urlToken) {
        try {
          const res = await fetch(`${N8N_WEBHOOK_URL}?session=${urlToken}`);
          if (res.ok) {
            const data = await res.json();
            if (data.first_name) {
              sessionContext = {
                first_name:    data.first_name,
                session_token: data.session_token || urlToken
              };
              localStorage.setItem(SESSION_KEY, JSON.stringify(sessionContext));
              window.history.replaceState({}, '', window.location.pathname);
              return true;
            }
          }
        } catch(e) {}
      }

      // 2. Check localStorage (returning standalone user)
      const stored = localStorage.getItem(SESSION_KEY);
      if (stored) {
        try {
          const data = JSON.parse(stored);
          if (data.first_name) {
            sessionContext = data;
            return true;
          }
        } catch(e) {}
      }

      // 3. Try ServiceM8 SDK (inside iframe)
      if (smClient) {
        try {
          const data = await smClient.invoke('get_session_context', {});
          if (data && data.session_token) {
            sessionContext = data;
            return true;
          }
        } catch(e) {}
      }

      // 4. No session found
      return false;
    }

    // ── Initialise on page load ─────────────────────────────
    async function init() {
      const hasSession = await resolveSession();

      if (hasSession) {
        const name = sessionContext.first_name || 'there';
        setStatus(`Ready — Hi ${name}!`);
        talkButton.disabled = false;
        authSection.classList.add('hidden');
      } else {
        setStatus('Please connect your ServiceM8 account', 'error');
        talkButton.disabled = true;
        authSection.classList.remove('hidden');
        const returnUrl = encodeURIComponent(window.location.href);
        connectBtn.href = OAUTH_URL + '&return=' + returnUrl;
      }
    }

    init();

    // ── Connect / disconnect ────────────────────────────────
    talkButton.addEventListener('click', async () => {
      if (currentRoom && currentRoom.state === 'connected') {
        await currentRoom.disconnect();
        resetUI();
        return;
      }

      try {
        setStatus('Getting secure token…', 'connecting');
        talkButton.disabled = true;

        const response = await fetch(
          `${N8N_WEBHOOK_URL}?session=${sessionContext?.session_token || ''}`
        );
        if (!response.ok) throw new Error('Token server returned ' + response.status);
        const data  = await response.json();
        const token = data.token;

        setStatus('Connecting to AI…', 'connecting');
        currentRoom = new Room();

        // Agent audio
        currentRoom.on(RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === 'audio') {
            const audioEl = track.attach();
            document.body.appendChild(audioEl);
          }
        });

        // Transcriptions — update one bubble per speaker turn
        currentRoom.on(RoomEvent.TranscriptionReceived, (segments, participant) => {
          const text = segments.map(s => s.text).join('').trim();
          if (!text) return;

          const identity = participant?.identity ?? 'unknown';
          const isAgent  = identity.startsWith('agent');
          const role     = isAgent ? 'agent' : 'user';
          const isFinal  = segments.some(s => s.final);

          if (!activeBubbles[identity]) {
            const bubble = addMessage(role, text);
            activeBubbles[identity] = { bubble, text };
          } else {
            activeBubbles[identity].bubble.textContent = text;
            transcriptBox.scrollTop = transcriptBox.scrollHeight;
          }

          if (isFinal) delete activeBubbles[identity];
        });

        console.log('[sm8] n8n response keys:', Object.keys(data));
        console.log('[sm8] session_token:', data.session_token);
        console.log('[sm8] first_name:', data.first_name);
        console.log('[sm8] access_token present:', !!data.access_token);

        await currentRoom.connect(LIVEKIT_URL, token);

        const metaSessionToken = data.session_token || sessionContext?.session_token || '';
        const participantMeta = JSON.stringify({
          first_name:    data.first_name   || '',
          session_token: metaSessionToken,
          access_token:  data.access_token || ''
        });
        console.log('[sm8] setting metadata, session_token present:', !!metaSessionToken);

        await currentRoom.localParticipant.setMetadata(participantMeta);

        await new Promise(resolve => setTimeout(resolve, 1000));

        setStatus('Starting assistant…', 'connecting');
        const dispatchRes = await fetch('https://n8n.srv1275355.hstgr.cloud/webhook/dispatch-agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room_name: data.room_name })
        });
        if (!dispatchRes.ok) {
          console.warn('[sm8] dispatch failed:', dispatchRes.status);
        } else {
          console.log('[sm8] agent dispatched to room:', data.room_name);
        }

        setStatus('Waiting for assistant…', 'connecting');
        await new Promise(resolve => {
          const checkAgent = () => {
            const participants = Array.from(currentRoom.remoteParticipants.values());
            const agentJoined = participants.some(p => p.identity.startsWith('agent'));
            if (agentJoined) {
              console.log('[sm8] agent joined, enabling mic');
              resolve();
            } else {
              console.log('[sm8] waiting for agent…', participants.length, 'remote participants');
              setTimeout(checkAgent, 500);
            }
          };
          currentRoom.on('participantConnected', (p) => {
            if (p.identity.startsWith('agent')) {
              console.log('[sm8] agent connected event:', p.identity);
              resolve();
            }
          });
          checkAgent();
        });

        await new Promise(resolve => setTimeout(resolve, 500));

        await currentRoom.localParticipant.setMicrophoneEnabled(true);

        transcriptBox.classList.remove('hidden');
        inputRow.classList.remove('hidden');
        talkButton.textContent = '⏹ End Call';
        talkButton.classList.add('active');
        talkButton.disabled = false;
        setStatus('Connected — speak or type', 'connected');

      } catch (err) {
        console.error('Connection error:', err);
        setStatus('Connection failed — try again', 'error');
        talkButton.disabled = false;
      }
    });

    // ── Send text message ───────────────────────────────────
    async function sendText() {
      const text = textInput.value.trim();
      if (!text || !currentRoom) return;

      textInput.value = '';
      sendBtn.disabled = true;
      addMessage('user', text);

      try {
        await currentRoom.localParticipant.sendText(text, { topic: 'lk.chat' });
      } catch (err) {
        console.error('Failed to send text to agent:', err);
      }

      sendBtn.disabled = false;
      textInput.focus();
    }

    sendBtn.addEventListener('click', sendText);
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    });

    // ── Reset ───────────────────────────────────────────────
    function resetUI() {
      currentRoom = null;
      transcriptBox.classList.add('hidden');
      inputRow.classList.add('hidden');
      transcriptEmpty.style.display = '';
      Array.from(transcriptBox.querySelectorAll('.message')).forEach(el => el.remove());
      talkButton.textContent = '🎙 Talk to Assistant';
      talkButton.classList.remove('active');
      talkButton.disabled = false;
      const name = sessionContext?.first_name || '';
      setStatus(name ? `Ready — Hi ${name}!` : 'Call ended — ready to connect');
    }
  </script>
</body>
</html>

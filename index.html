<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceM8 AI Assistant</title>
  <style>
    /* Modern, clean styling for the user interface */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: #111827;
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 16px;
      display: block;
      min-height: 20px;
    }
    /* Talk Button Styles */
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      width: 100%;
      box-sizing: border-box;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    .active-call {
      background-color: #ef4444; /* Red for 'End Call' */
    }
    .active-call:hover {
      background-color: #dc2626;
    }
    
    /* ServiceM8 OAuth Button Styles */
    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 32px 0 24px 0;
    }
    .sub-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .connect-sm8-btn {
      display: block;
      background-color: #10b981; /* Emerald Green */
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      width: 100%;
      box-sizing: border-box;
    }
    .connect-sm8-btn:hover {
      background-color: #059669;
    }
    .connect-sm8-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>ServiceM8 Assistant</h1>
    <p>Click the button below to connect to your intelligent voice dispatcher.</p>
    
    <span id="statusText" class="status-text">Ready to connect</span>
    <button id="talkButton">Talk to Assistant</button>

    <hr class="divider">
    <div class="sub-text">First time here? Link your account to the AI:</div>

    <a href="https://go.servicem8.com/oauth/authorize?response_type=code&client_id=175357&redirect_uri=https://n8n.srv1275355.hstgr.cloud/webhook/servicem8-oauth-callback&scope=manage_jobs%20manage_clients&state=tenant_001" class="connect-sm8-btn">
  Connect ServiceM8
</a>
  </div>

  <script type="module">
    import { Room, RoomEvent } from 'https://esm.sh/livekit-client@2.5.9';

    // === YOUR CONFIGURATION VARIABLES ===
    const N8N_WEBHOOK_URL = 'https://n8n.srv1275355.hstgr.cloud/webhook/generate-voice-token?user=beta-tester';
    const LIVEKIT_URL = 'wss://test1-ntnp1zzo.livekit.cloud';
    // ====================================

    const talkButton = document.getElementById('talkButton');
    const statusText = document.getElementById('statusText');
    let currentRoom = null;

    talkButton.addEventListener('click', async () => {
      if (currentRoom && currentRoom.state === 'connected') {
        await currentRoom.disconnect();
        resetUI();
        return;
      }

      try {
        updateUI('Getting secure token...', true);
        const response = await fetch(N8N_WEBHOOK_URL);
        
        if (!response.ok) {
           console.error("n8n responded with status:", response.status);
           throw new Error('Failed to fetch token from n8n');
        }
        
        const data = await response.json();
        const token = data.token;

        console.log("✅ Token successfully received from n8n!");
        console.log("Raw Token String:", token);

        updateUI('Connecting to AI...', true);
        currentRoom = new Room();

        currentRoom.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
          if (track.kind === 'audio') {
            const audioElement = track.attach();
            document.body.appendChild(audioElement);
          }
        });

        await currentRoom.connect(LIVEKIT_URL, token);
        await currentRoom.localParticipant.setMicrophoneEnabled(true);

        updateUI('Connected! Start speaking.', false, true);

      } catch (error) {
        console.error('❌ Connection error detailed:', error);
        updateUI('Connection failed. Check console.', false);
      }
    });

    function updateUI(statusMessage, isConnecting, isConnected = false) {
      statusText.innerText = statusMessage;
      talkButton.disabled = isConnecting;
      
      if (isConnected) {
        talkButton.innerText = 'End Call';
        talkButton.classList.add('active-call');
      }
    }

    function resetUI() {
      currentRoom = null;
      statusText.innerText = 'Call ended. Ready to connect.';
      talkButton.innerText = 'Talk to Assistant';
      talkButton.classList.remove('active-call');
      talkButton.disabled = false;
    }
  </script>
</body>
</html>

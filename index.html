<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceM8 AI Assistant</title>
  <style>
    /* Modern, clean styling for the user interface */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: #111827;
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 16px;
      display: block;
      min-height: 20px;
    }
    /* Talk Button Styles */
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      width: 100%;
      box-sizing: border-box;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    .active-call {
      background-color: #ef4444; /* Red for 'End Call' */
    }
    .active-call:hover {
      background-color: #dc2626;
    }
    
    /* ServiceM8 OAuth Button Styles */
    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 32px 0 24px 0;
    }

      color: #6b7280;
      margin-bottom: 16px;
    }
